          }
        }
      }
    }

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    .card-scroll::-webkit-scrollbar{width:5px}
    .card-scroll::-webkit-scrollbar-track{background:transparent}
    .card-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px}
    .card-scroll::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.14)}
    .detail-scroll::-webkit-scrollbar{width:5px}
    .detail-scroll::-webkit-scrollbar-track{background:transparent}
    .detail-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:10px}
    .stagger-card{opacity:0;transform:translateY(16px)}
    .stagger-card.visible{animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;animation-delay:calc(var(--i)*60ms)}
    @keyframes cardIn{to{opacity:1;transform:translateY(0)}}
    .song-card{transition:all 0.3s cubic-bezier(0.16,1,0.3,1)}
    .song-card:hover{background:rgba(255,255,255,0.06)}
    .song-card:active{transform:scale(0.98)}
    .song-card.selected{background:linear-gradient(135deg,#cc2d56,#e04d6f);border-color:transparent;box-shadow:0 8px 32px -4px rgba(204,45,86,0.4),0 2px 8px -2px rgba(204,45,86,0.2)}
    .song-card.selected .song-title{color:#fff}
    .song-card.selected .badge{background:rgba(255,255,255,0.18)!important;color:#fff!important;border-color:rgba(255,255,255,0.1)!important}
    .song-card.selected .file-count-num{color:rgba(255,255,255,0.7)}
    .song-card.selected .card-chevron{color:rgba(255,255,255,0.5)}
    .file-item{transition:all 0.2s cubic-bezier(0.16,1,0.3,1)}
    .file-item:hover{background:rgba(255,255,255,0.08);transform:translateX(4px)}
    .file-item:active{transform:translateX(4px) scale(0.98)}
    .filter-chip{transition:all 0.25s cubic-bezier(0.16,1,0.3,1)}
    .filter-chip:active{transform:scale(0.95)}
    .search-wrap{transition:all 0.3s cubic-bezier(0.16,1,0.3,1)}
    .search-wrap:focus-within{border-color:rgba(204,45,86,0.4);box-shadow:0 0 0 3px rgba(204,45,86,0.08),0 1px 2px rgba(0,0,0,0.1)}
    .dropbox-link{transition:all 0.25s cubic-bezier(0.16,1,0.3,1)}
    .dropbox-link:hover{background:rgba(204,45,86,0.25);color:#fff}
    .dropbox-link:active{transform:scale(0.97)}
    .detail-enter{animation:detailFade 0.4s cubic-bezier(0.16,1,0.3,1) forwards}
    @keyframes detailFade{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
    .welcome-icon-wrap{animation:gentlePulse 3s ease-in-out infinite}
    @keyframes gentlePulse{0%,100%{opacity:0.15;transform:scale(1)}50%{opacity:0.22;transform:scale(1.05)}}
    @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
    .noise-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
    .panel-divider{width:1px;background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,0.06) 15%,rgba(255,255,255,0.06) 85%,transparent 100%)}
    .section-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .mobile-detail-overlay{position:fixed;inset:0;z-index:50;background:#0a0a14;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);overflow-y:auto}
    .mobile-detail-overlay.open{transform:translateX(0)}
    .badge{transition:all 0.2s cubic-bezier(0.16,1,0.3,1)}
    .badge:hover{transform:scale(1.05)}
  </style>
</head>
<body class="font-sans antialiased bg-surface-950 text-white overflow-x-hidden">
<div class="noise-overlay"></div>

<!-- HERO -->
<section class="relative min-h-[70dvh] md:min-h-[85dvh] flex items-center justify-center overflow-hidden" id="hero">
  <div class="absolute inset-0 z-0">
    <img id="heroImg" src="img/hero.jpg" alt="Cava kor"
         class="w-full h-full object-cover" style="height:120%;transform:scale(1.1);will-change:transform;">
    <div class="absolute inset-0 bg-gradient-to-b from-surface-950/30 via-surface-950/60 to-surface-950"></div>
  </div>
  <div class="relative z-10 text-center px-6">
    <h1 id="heroTitle" class="text-5xl md:text-8xl font-extrabold tracking-tighter leading-none">
      Kor <span class="text-cava-500">Cava</span>
    </h1>
    <p id="heroSub" class="mt-3 text-lg md:text-xl text-white/40 font-light tracking-wide">
      Repertoar og ressurser i Dropbox
    </p>
  </div>
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-1 text-white/20 text-sm" id="scrollHint"
       style="animation:bob 2s ease-in-out infinite">
    <span class="font-light">Scroll ned</span>
    <i class="ph ph-caret-down text-lg"></i>
  </div>
</section>

<!-- DASHBOARD (desktop) -->
<section class="hidden md:flex" id="dashboard" style="position:sticky;top:0;min-height:100dvh;">
  <div class="flex-[3] flex flex-col py-6 pl-6 pr-3 max-h-[100dvh] overflow-hidden">
    <div class="flex items-center gap-3 mb-4 flex-shrink-0">
      <div class="search-wrap flex-1 flex items-center gap-2.5 bg-white/[0.04] border border-white/[0.06] rounded-xl px-4 py-2.5">
        <i class="ph ph-magnifying-glass text-white/25 text-base"></i>
        <input type="text" placeholder="S&#xf8;k i repertoaret..."
               class="bg-transparent border-none outline-none text-white text-sm w-full placeholder:text-white/25 font-light"
               id="searchInput">
      </div>
      <div class="flex bg-white/[0.04] rounded-xl p-1 flex-shrink-0 border border-white/[0.04]">
        <button class="tab-btn px-4 py-2 rounded-lg text-xs font-semibold transition-all" id="tabLaater" onclick="switchTab('laater')">Repertoar</button>
        <button class="tab-btn px-4 py-2 rounded-lg text-xs font-semibold transition-all" id="tabJul" onclick="switchTab('jul')">Julesanger</button>
      </div>
    </div>
    <div class="flex items-center gap-2 mb-4 flex-shrink-0">
      <button class="filter-chip text-xs font-medium px-3 py-1.5 rounded-lg border" data-filter="noter" onclick="toggleFilter('noter')">
        <i class="ph ph-music-notes text-[11px] mr-1"></i>Noter</button>
      <button class="filter-chip text-xs font-medium px-3 py-1.5 rounded-lg border" data-filter="lyd" onclick="toggleFilter('lyd')">
        <i class="ph ph-speaker-high text-[11px] mr-1"></i>&#xd8;vingsfiler</button>
      <button class="filter-chip text-xs font-medium px-3 py-1.5 rounded-lg border" data-filter="tekst" onclick="toggleFilter('tekst')">
        <i class="ph ph-text-aa text-[11px] mr-1"></i>Tekst</button>
      <span class="ml-auto text-[11px] text-white/15 font-light tabular-nums" id="songCount"></span>
    </div>
    <div class="card-scroll flex-1 overflow-y-auto flex flex-col gap-1.5 pr-2" id="cardList"></div>
    <div class="hidden flex-1 items-center justify-center text-center flex-col" id="emptyState">
      <i class="ph ph-music-notes-simple text-4xl text-white/10 mb-3"></i>
      <p class="text-sm text-white/30">Ingen l&#xe5;ter funnet</p>
      <p class="text-xs text-white/15 mt-1">Pr&#xf8;v et annet s&#xf8;keord eller fjern filtre</p>
    </div>
  </div>
  <div class="panel-divider flex-shrink-0"></div>
  <div class="flex-[2] flex flex-col max-h-[100dvh] overflow-hidden" id="rightPanel">
    <div class="flex-1 flex flex-col items-center justify-center text-center px-8" id="welcomeState">
      <div class="welcome-icon-wrap mb-6"><i class="ph ph-music-notes-simple text-6xl text-white/15"></i></div>
      <h2 class="text-xl font-bold text-white/40 mb-2">Velg en l&#xe5;t</h2>
      <p class="text-sm text-white/20 max-w-[240px] leading-relaxed font-light">Klikk p&#xe5; en l&#xe5;t i listen til venstre for &#xe5; se noter, &#xf8;vingsfiler og tekster.</p>
    </div>
    <div class="hidden detail-scroll flex-1 overflow-y-auto p-6 flex-col" id="detailState"></div>
  </div>
</section>

<!-- MOBILE LAYOUT -->
<section class="md:hidden" id="mobileDashboard">
  <div class="px-4 pt-4 pb-3 bg-surface-950 sticky top-0 z-30">
    <div class="flex items-center gap-2 mb-3">
      <div class="search-wrap flex-1 flex items-center gap-2 bg-white/[0.04] border border-white/[0.06] rounded-xl px-3 py-2">
        <i class="ph ph-magnifying-glass text-white/25 text-sm"></i>
        <input type="text" placeholder="S&#xf8;k..."
               class="bg-transparent border-none outline-none text-white text-sm w-full placeholder:text-white/25 font-light"
               id="searchInputMobile">
      </div>
      <div class="flex bg-white/[0.04] rounded-lg p-0.5 flex-shrink-0 border border-white/[0.04]">
        <button class="tab-btn-mobile px-3 py-1.5 rounded-md text-[11px] font-semibold transition-all" id="tabLaaterMobile" onclick="switchTab('laater')">Repertoar</button>
        <button class="tab-btn-mobile px-3 py-1.5 rounded-md text-[11px] font-semibold transition-all" id="tabJulMobile" onclick="switchTab('jul')">Jul</button>
      </div>
    </div>
    <div class="flex items-center gap-1.5">
      <button class="filter-chip text-[10px] font-medium px-2.5 py-1 rounded-lg border" data-filter-m="noter" onclick="toggleFilter('noter')">
        <i class="ph ph-music-notes text-[9px] mr-0.5"></i>Noter</button>
      <button class="filter-chip text-[10px] font-medium px-2.5 py-1 rounded-lg border" data-filter-m="lyd" onclick="toggleFilter('lyd')">
        <i class="ph ph-speaker-high text-[9px] mr-0.5"></i>&#xd8;ving</button>
      <button class="filter-chip text-[10px] font-medium px-2.5 py-1 rounded-lg border" data-filter-m="tekst" onclick="toggleFilter('tekst')">
        <i class="ph ph-text-aa text-[9px] mr-0.5"></i>Tekst</button>
      <span class="ml-auto text-[10px] text-white/15 tabular-nums" id="songCountMobile"></span>
    </div>
  </div>
  <div class="px-4 pb-6 flex flex-col gap-1.5" id="cardListMobile"></div>
  <div class="hidden px-4 py-16 text-center" id="emptyStateMobile">
    <i class="ph ph-music-notes-simple text-4xl text-white/10 mb-3 block"></i>
    <p class="text-sm text-white/30">Ingen l&#xe5;ter funnet</p>
  </div>
</section>

<!-- Mobile detail overlay -->
<div class="mobile-detail-overlay" id="mobileDetail">
  <div class="sticky top-0 z-10 bg-surface-950/90 backdrop-blur-xl px-4 py-3 flex items-center gap-3 border-b border-white/[0.04]">
    <button onclick="closeMobileDetail()" class="text-white/50 hover:text-white transition-colors">
      <i class="ph ph-arrow-left text-xl"></i>
    </button>
    <span class="text-sm font-semibold text-white/70 truncate" id="mobileDetailTitle"></span>
  </div>
  <div class="p-5" id="mobileDetailContent"></div>
</div>

<footer class="border-t border-white/[0.04] py-8 text-center text-xs text-white/15">
  <p>Cava Korforening &#183; Repertoaroversikt &#183; Oppdatert mars 2026</p>
</footer>

var DB_HOME = "https://www.dropbox.com/home";
var DB_PREVIEW = "https://www.dropbox.com/preview";
var PATH_LAAT = "/Cava Felles/Ny mappestruktur ( under arbeid)/02- Lydfiler og noter";
var PATH_JUL = PATH_LAAT + "/_JUL";

function dbUrl(base, folder, file) {
  return DB_PREVIEW + encodeURI(base + "/" + folder + "/" + file).replace(/#/g, "%23").replace(/\?/g, "%3F") + "?context=standalone_preview&role=personal";
}
function dbFolderUrl(base, folder) {
  return DB_HOME + encodeURI(base + "/" + folder).replace(/#/g, "%23");
}

function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function isAudio(fn) {
  var l = fn.toLowerCase();
  return l.endsWith('.mp3') || l.endsWith('.m4a') || l.endsWith('.wav') || l.endsWith('.mp4') || l.endsWith('.aiff') || l.endsWith('.3ga');
}
function isNoter(fn) {
  var l = fn.toLowerCase();
  if (l.indexOf('tekst') >= 0) return false;
  if (l.indexOf('ressursinfo') >= 0) return false;
  return l.endsWith('.pdf') || l.endsWith('.png') || l.endsWith('.jpg') || l.endsWith('.jpeg');
}
function isTekst(fn) {
  var l = fn.toLowerCase();
  return l.indexOf('tekst') >= 0 || l.endsWith('.txt') || l.endsWith('.url');
}

function parseSongs(raw, type) {
  var base = type === "jul" ? PATH_JUL : PATH_LAAT;
  return raw.map(function(item) {
    var navn = item[0], filer = item[1];
    var noter = [], lyd = [], tekst = [], other = [];
    filer.forEach(function(fn) {
      var obj = { navn: fn, url: dbFolderUrl(base, navn) };
      if (isTekst(fn)) { tekst.push(obj); }
      else if (isNoter(fn)) { noter.push(obj); }
      else if (isAudio(fn)) { lyd.push(obj); }
      else { other.push(obj); }
    });
    var s = STEMME[navn] || [false,false];
    return {
      navn: navn, noter: noter, lyd: lyd, tekst: tekst, other: other,
      mappeUrl: dbFolderUrl(base, navn),
      harNoter: noter.length > 0, harLyd: lyd.length > 0, harTekst: tekst.length > 0,
      stemmeLyd: s[0], stemmeNoter: s[1],
    };
  });
}

function makeBadge(label, icon, bgColor, textColor, borderColor) {
  return '<span class="badge inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded-md border ' +
    bgColor + ' ' + textColor + ' ' + borderColor + '">' +
    '<i class="ph ' + icon + ' text-[9px]"></i>' + esc(label) + '</span>';
}

function songBadges(song) {
  var b = '';
  if (song.noter.length) b += makeBadge('Noter (' + song.noter.length + ')', 'ph-music-notes', 'bg-emerald-500/10', 'text-emerald-400', 'border-emerald-500/10');
  if (song.lyd.length) b += makeBadge('\u00d8vingsfiler (' + song.lyd.length + ')', 'ph-speaker-high', 'bg-blue-500/10', 'text-blue-400', 'border-blue-500/10');
  if (song.tekst.length) b += makeBadge('Tekst (' + song.tekst.length + ')', 'ph-text-aa', 'bg-amber-500/10', 'text-amber-400', 'border-amber-500/10');
  if (song.other.length) b += makeBadge('Annet (' + song.other.length + ')', 'ph-file', 'bg-white/[0.04]', 'text-white/40', 'border-white/[0.04]');
  if (song.stemmeLyd) b += makeBadge('Har stemmevise \u00f8vingsfiler', 'ph-users-three', 'bg-violet-500/10', 'text-violet-400', 'border-violet-500/10');
  if (song.stemmeNoter) b += makeBadge('Har stemmevise noter', 'ph-music-notes-simple', 'bg-rose-500/10', 'text-rose-400', 'border-rose-500/10');

function fileIcon(fn) {
  var low = fn.toLowerCase();
  if (low.endsWith('.pdf')) return 'ph-file-pdf';
  if (low.endsWith('.mp3') || low.endsWith('.m4a') || low.endsWith('.wav') || low.endsWith('.mp4') || low.endsWith('.aiff') || low.endsWith('.3ga')) return 'ph-play-circle';
  if (low.endsWith('.png') || low.endsWith('.jpg') || low.endsWith('.jpeg')) return 'ph-file-image';
  if (low.endsWith('.docx')) return 'ph-file-doc';
  if (low.endsWith('.txt')) return 'ph-file-text';
  return 'ph-file';
}

function fileIconColor(category) {
  if (category === 'noter') return 'text-emerald-400';
  if (category === 'lyd') return 'text-blue-400';
  if (category === 'tekst') return 'text-amber-400';
  return 'text-white/30';
}

function renderFileSection(files, title, dotColor, category) {
  if (!files.length) return '';
  var items = files.map(function(f) {
    return '<a href="' + esc(f.url) + '" target="_blank" rel="noopener" class="file-item flex items-center gap-3 px-3 py-2.5 rounded-xl bg-white/[0.03] cursor-pointer">' +
      '<i class="ph ' + fileIcon(f.navn) + ' ' + fileIconColor(category) + ' text-sm"></i>' +
      '<span class="text-[13px] text-white/60 font-light truncate">' + esc(f.navn) + '</span>' +
    '</a>';
  }).join('');
  return '<div class="mb-5">' +
    '<div class="flex items-center gap-2 mb-2">' +
      '<div class="section-dot ' + dotColor + '"></div>' +
      '<span class="text-[10px] font-bold text-white/30 uppercase tracking-widest">' + esc(title) + '</span>' +
    '</div>' +
    '<div class="flex flex-col gap-1">' + items + '</div>' +
  '</div>';
}

  if (song.lyd.length) detailBadges += '<span class="text-[11px] font-semibold px-2.5 py-1 rounded-lg bg-blue-500/10 text-blue-400 border border-blue-500/10"><i class="ph ph-speaker-high text-[10px] mr-1"></i>\u00d8vingsfiler (' + song.lyd.length + ')</span>';
  if (song.tekst.length) detailBadges += '<span class="text-[11px] font-semibold px-2.5 py-1 rounded-lg bg-amber-500/10 text-amber-400 border border-amber-500/10"><i class="ph ph-text-aa text-[10px] mr-1"></i>Tekst (' + song.tekst.length + ')</span>';

  return '<div class="detail-enter flex flex-col h-full">' +

    '<div class="mt-4 flex-shrink-0 pt-4 border-t border-white/[0.04]">' +
      '<a href="' + esc(song.mappeUrl) + '" target="_blank" rel="noopener" class="dropbox-link flex items-center justify-center gap-2 bg-cava-600/15 text-cava-400 text-sm font-semibold py-3 px-4 rounded-xl border border-cava-600/15">' +
        '<i class="ph ph-arrow-square-out text-base"></i>\u00c5pne mappen i Dropbox</a>' +

    requestAnimationFrame(function() {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) { entry.target.classList.add("visible"); observer.unobserve(entry.target); }
        });
      }, { threshold: 0.05 });

    });
  }

  var mCount = document.getElementById("songCountMobile");
  if (mCount) mCount.textContent = countText;

    } else {
      if (mEmpty) mEmpty.classList.add("hidden");
      mList.innerHTML = songs.map(function(s, i) { return renderCard(s, i); }).join("");
      requestAnimationFrame(function() {
        var observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) { entry.target.classList.add("visible"); observer.unobserve(entry.target); }
          });
        }, { threshold: 0.05 });
        mList.querySelectorAll(".stagger-card").forEach(function(el) { observer.observe(el); });
      });
    }
  }
}

document.getElementById("searchInput").addEventListener("input", function(e) {
  searchQuery = e.target.value;
  var mInput = document.getElementById("searchInputMobile");
  if (mInput) mInput.value = searchQuery;
  render();
});
var mSearchInput = document.getElementById("searchInputMobile");
if (mSearchInput) {
  mSearchInput.addEventListener("input", function(e) {
    searchQuery = e.target.value;
    document.getElementById("searchInput").value = searchQuery;
    render();
  });
}

});
gsap.to('#scrollHint', {
  opacity: 0, y: 20,
  scrollTrigger: { trigger: '#hero', start: '20% top', end: '40% top', scrub: true }
});

updateFilterChips();
render();
